name: Docker Build and Push to ACR

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: azure26container.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t azure26container.azurecr.io/fronting-app:${{ github.sha }} -t azure26container.azurecr.io/fronting-app:latest ./fronting
          docker push azure26container.azurecr.io/fronting-app:${{ github.sha }}
          docker push azure26container.azurecr.io/fronting-app:latest
